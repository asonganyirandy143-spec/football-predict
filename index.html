<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { background: #060c18; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .solid  { font-family: 'Bebas Neue', sans-serif; color: #fff; }
    .outline { font-family: 'Bebas Neue', sans-serif; -webkit-text-stroke: 1.5px rgba(255,255,255,0.2); color: transparent; }
    @keyframes ping    { 75%,100%{ transform:scale(2); opacity:0; } }
    @keyframes pulse   { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
    .ping        { animation: ping 1.4s cubic-bezier(0,0,0.2,1) infinite; }
    .skeleton    { animation: pulse 1.6s ease-in-out infinite; }
    .filter-btn  { padding:6px 16px; border-radius:9999px; font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.03); color:#fff; cursor:pointer; transition:all 0.2s; }
    .filter-btn:hover { background:rgba(255,255,255,0.08); }
    .filter-btn.active { background:#fff; color:#060c18; border-color:#fff; }
    .refresh-btn { padding:6px 16px; border-radius:9999px; font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; border:1px solid rgba(34,197,94,0.25); background:rgba(34,197,94,0.08); color:#22c55e; cursor:pointer; transition:all 0.2s; }
    .refresh-btn:hover { background:rgba(34,197,94,0.15); }
    .refresh-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .stat-pill   { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); }
    .match-card  { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:12px; animation:slideIn 0.5s ease-out forwards; opacity:0; }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .match-card.hidden { display:none !important; }
  </style>
</head>
<body class="grid-bg">

  <div class="relative max-w-2xl mx-auto px-4 py-10">

    <!-- Header -->
    <div style="margin-bottom:32px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="position:relative;display:inline-flex;width:8px;height:8px;">
          <span class="ping" style="position:absolute;inset:0;border-radius:9999px;background:#22c55e;opacity:0.75;"></span>
          <span style="position:relative;width:8px;height:8px;border-radius:9999px;background:#22c55e;display:inline-flex;"></span>
        </span>
        <span style="font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#22c55e;">Today's Predictions</span>
      </div>
      <h1 style="line-height:1;margin:0;">
        <span class="solid"   style="font-size:56px;display:block;">Match</span>
        <span class="outline" style="font-size:56px;display:block;">Predictor</span>
      </h1>
      <p id="today-date" style="margin-top:8px;font-size:13px;color:#334155;"></p>
    </div>

    <!-- Stats -->
    <div id="stats-row" style="display:flex;gap:12px;margin-bottom:24px;">
      <div class="stat-pill"><span id="stat-total" style="font-size:22px;font-weight:800;color:#fff;">0</span><span style="font-size:11px;color:#475569;">Matches Today</span></div>
      <div class="stat-pill"><span id="stat-home"  style="font-size:22px;font-weight:800;color:#fff;">0</span><span style="font-size:11px;color:#475569;">Home Favoured</span></div>
      <div class="stat-pill"><span id="stat-away"  style="font-size:22px;font-weight:800;color:#fff;">0</span><span style="font-size:11px;color:#475569;">Away Favoured</span></div>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="home">Home</button>
      <button class="filter-btn" data-filter="away">Away</button>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>

    <!-- Cards -->
    <div id="cards" style="display:flex;flex-direction:column;gap:16px;"></div>

    <script>
      let allPredictions = [];

      async function fetchPredictions() {
        try {
          const refreshBtn = document.getElementById('refresh-btn');
          refreshBtn.disabled = true;
          refreshBtn.textContent = '↻ Loading...';
          
          const res = await fetch('/api/predictions');
          const data = await res.json();

          if (!Array.isArray(data)) {
            console.error('Invalid response format:', data);
            refreshBtn.disabled = false;
            refreshBtn.textContent = '↻ Refresh';
            return;
          }

          allPredictions = data;
          renderMatches(data);
          
          refreshBtn.disabled = false;
          refreshBtn.textContent = '↻ Refresh';
        } catch (err) {
          console.error('Failed to fetch predictions:', err);
          document.getElementById('cards').innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">Failed to load predictions. Please try again.</div>';
          document.getElementById('refresh-btn').disabled = false;
          document.getElementById('refresh-btn').textContent = '↻ Refresh';
        }
      }

      function renderMatches(predictions) {
        const cardsContainer = document.getElementById('cards');
        cardsContainer.innerHTML = '';

        if (predictions.length === 0) {
          cardsContainer.innerHTML = '<div style="color:#94a3b8;padding:20px;text-align:center;">No matches available for today.</div>';
          updateStats(predictions);
          return;
        }

        // Update date display
        const today = new Date();
        const dateStr = today.toLocaleDateString('en-US', { 
          weekday: 'short', 
          month: 'short', 
          day: 'numeric',
          year: 'numeric'
        });
        document.getElementById('today-date').textContent = dateStr;

        let homeCount = 0, awayCount = 0;

        predictions.forEach((prediction, index) => {
          if (prediction.predictedWinner === 'Home Team') homeCount++;
          else awayCount++;

          const card = buildCard(prediction, index);
          cardsContainer.innerHTML += card;
        });

        updateStats(predictions, homeCount, awayCount);
        applyCurrentFilter();
      }

      function updateStats(predictions, homeCount = 0, awayCount = 0) {
        document.getElementById('stat-total').textContent = predictions.length;
        document.getElementById('stat-home').textContent = homeCount;
        document.getElementById('stat-away').textContent = awayCount;
      }

      function buildCard(p, index) {
        const { teams, homeProb, awayProb, predictedWinner } = p;
        const homeColor = getTeamColor(teams.homeTeamName);
        const awayColor = getTeamColor(teams.awayTeamName);
        const homeWins = predictedWinner === 'Home Team';
        const winnerName = homeWins ? teams.homeTeamName : teams.awayTeamName;
        const winnerColor = homeWins ? homeColor : awayColor;
        const confidence = Math.max(homeProb, awayProb);
        const homeBg = getTeamColorAlpha(teams.homeTeamName, 0.14);
        const homeBorder = getTeamColorAlpha(teams.homeTeamName, 0.28);
        const awayBg = getTeamColorAlpha(teams.awayTeamName, 0.14);
        const awayBorder = getTeamColorAlpha(teams.awayTeamName, 0.28);
        const winBg = getTeamColorAlpha(winnerName, 0.12);

        return `
          <div class="match-card" data-winner="${homeWins ? 'home' : 'away'}" style="animation-delay:${index * 70}ms;">
            <div style="height:2px;background:linear-gradient(90deg,${homeColor} 0%,${homeColor}44 45%,${awayColor}44 55%,${awayColor} 100%);"></div>
            <div style="padding:20px;display:flex;flex-direction:column;gap:16px;">
              <div style="display:flex;align-items:center;gap:12px;">
                <!-- Home -->
                <div style="flex:1;display:flex;align-items:center;gap:10px;min-width:0;">
                  <div style="width:32px;height:32px;border-radius:8px;background:${homeBg};border:1px solid ${homeBorder};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <span style="font-size:10px;font-weight:800;color:${homeColor};">${getInitials(teams.homeTeamName)}</span>
                  </div>
                  <div style="min-width:0;">
                    <div style="font-weight:700;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${teams.homeTeamName}</div>
                    <div style="font-size:11px;color:#475569;">Home</div>
                  </div>
                </div>

                <div style="font-size:11px;font-weight:800;color:#1e3a5f;flex-shrink:0;">VS</div>

                <!-- Away -->
                <div style="flex:1;display:flex;align-items:center;gap:10px;justify-content:flex-end;min-width:0;">
                  <div style="min-width:0;text-align:right;">
                    <div style="font-weight:700;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${teams.awayTeamName}</div>
                    <div style="font-size:11px;color:#475569;">Away</div>
                  </div>
                  <div style="width:32px;height:32px;border-radius:8px;background:${awayBg};border:1px solid ${awayBorder};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <span style="font-size:10px;font-weight:800;color:${awayColor};">${getInitials(teams.awayTeamName)}</span>
                  </div>
                </div>
              </div>

              <!-- Bar -->
              <div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                  <span style="font-size:11px;font-weight:700;color:${homeColor};">${homeProb}%</span>
                  <span style="font-size:11px;color:#334155;">win probability</span>
                  <span style="font-size:11px;font-weight:700;color:${awayColor};">${awayProb}%</span>
                </div>
                <div style="height:6px;border-radius:9999px;overflow:hidden;background:#0a1628;display:flex;">
                  <div class="bar-fill" style="height:100%;border-radius:9999px 0 0 9999px;background:${homeColor};width:${homeProb}%;"></div>
                  <div style="height:100%;border-radius:0 9999px 9999px 0;background:${awayColor};flex:1;"></div>
                </div>
              </div>

              <!-- Footer -->
              <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.04);padding-top:10px;">
                <div style="display:flex;align-items:center;gap:6px;">
                  <span style="color:#22c55e;font-size:11px;">✦</span>
                  <span style="font-size:12px;font-weight:600;color:${winnerColor};">${winnerName}</span>
                  <span style="font-size:12px;color:#334155;">predicted to win</span>
                </div>
                <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:9999px;background:${winBg};color:${winnerColor};">${confidence}%</span>
              </div>

            </div>
          </div>
        `;
      }

      function getTeamColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        const hue = Math.abs(hash) % 360;
        const sat = 55 + (Math.abs(hash >> 8) % 25);
        const lit = 48 + (Math.abs(hash >> 16) % 14);
        return `hsl(${hue},${sat}%,${lit}%)`;
      }

      function getTeamColorAlpha(name, alpha) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return `hsla(${Math.abs(hash) % 360},55%,55%,${alpha})`;
      }

      function getInitials(name) {
        const SKIP = new Set(['FC', 'CF', 'SC', 'AC', 'AS', 'SS', 'US', 'FK', 'SK', 'BV', 'VfL', 'VfB', 'TSG', 'RB', '1.', 'de', 'of', 'the', '&']);
        const parts = name.split(/\s+/).filter(w => !SKIP.has(w));
        return parts.slice(0, 2).map(w => w[0]).join('') || name.slice(0, 2).toUpperCase();
      }

      function applyCurrentFilter() {
        const activeFilter = document.querySelector('.filter-btn.active');
        if (!activeFilter) return;
        
        const filter = activeFilter.dataset.filter;
        const cards = document.querySelectorAll('.match-card');
        
        cards.forEach(card => {
          if (filter === 'all') {
            card.classList.remove('hidden');
          } else {
            const winner = card.dataset.winner;
            if (winner === filter) {
              card.classList.remove('hidden');
            } else {
              card.classList.add('hidden');
            }
          }
        });
      }

      // Wire up filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          applyCurrentFilter();
        });
      });

      // Wire up refresh button
      document.getElementById('refresh-btn').addEventListener('click', fetchPredictions);

      // Initial fetch
      fetchPredictions();
    </script>
  </div>
</body>
</html>
